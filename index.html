<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MURENA_OS - Win95 [MAXISCHERMO & ANIMATO]</title>
    <!-- Libreria base per l'estetica delle finestre Win95/98 -->
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        /* IMPOSTAZIONI GLOBALI E CURSORI RETRO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: white;
            font-family: 'Pixelated MS Sans Serif', Arial, sans-serif;
            overflow: hidden;
            cursor: url('https://raw.githubusercontent.com/AlexMeub/win98-icons/master/cursors/arrow.cur'), default;
        }

        .clickable {
            cursor: url('https://raw.githubusercontent.com/AlexMeub/win98-icons/master/cursors/pointer.cur'), pointer;
        }

        /* EFFETTO TUBO CATODICO (CRT) */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            animation: flicker 0.15s infinite, glitch-jump 7s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 0.95; }
        }

        @keyframes glitch-jump {
            0% { transform: translateY(0); opacity: 1; }
            98% { transform: translateY(0); opacity: 1; }
            99% { transform: translateY(2px); opacity: 0.8; }
            100% { transform: translateY(-1px); opacity: 0.9; }
        }

        /* LAYOUT DEL DESKTOP (INGRANDITO) */
        .desktop {
            display: flex;
            flex-direction: column;
            gap: 35px;
            padding: 30px;
            height: calc(100vh - 80px);
            position: absolute;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 110px;
            text-align: center;
        }

        /* ICONE GENERALI INGRANDITE */
        .desktop-icon img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated; 
            margin-bottom: 8px;
        }

        /* IL TUO CESTINO ANIMATO (Spritesheet 5x5) */
        .cestino-animato {
            width: 64px;
            height: 64px;
            background-image: url('assets/cestino.png');
            /* Dimensioni totali del background: 64px * 5 = 320px */
            background-size: 320px 320px; 
            image-rendering: pixelated;
            margin-bottom: 8px;
            /* X completa 5 scatti ogni 0.4s, Y scende di una riga ogni 0.4s (totale 2s) */
            animation: 
                cestino-x 0.4s steps(5) infinite,
                cestino-y 2.0s steps(5) infinite;
        }

        /* Movimento orizzontale (colonne) */
        @keyframes cestino-x {
            from { background-position-x: 0px; }
            to { background-position-x: -320px; }
        }

        /* Movimento verticale (righe) */
        @keyframes cestino-y {
            from { background-position-y: 0px; }
            to { background-position-y: -320px; }
        }

        .desktop-icon span {
            color: white;
            font-size: 16px;
            padding: 4px;
            text-shadow: 2px 2px 0px #000;
        }

        .desktop-icon:active span {
            background-color: #000080;
            border: 1px dotted white;
        }

        /* FINESTRE */
        .window {
            position: absolute;
            display: none;
            z-index: 100;
        }

        /* FINESTRA MODEM DIAL-UP (Scala più grande) */
        #dialup-window {
            top: 30%;
            left: 35%;
            width: 450px;
        }
        #dialup-window .title-bar-text { font-size: 14px; }
        #dial-status { font-size: 16px; }

        .dialup-content {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        /* FINESTRA BROWSER MUUGLE (MAXISCHERMO) */
        #browser-window {
            top: 5%;
            left: 5%;
            width: 90%;
            height: 85%;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.8);
        }
        #browser-window .title-bar-text { font-size: 16px; }

        .browser-toolbar {
            background: #c0c0c0;
            padding: 10px;
            border-bottom: 2px solid white;
            display: flex;
            align-items: center;
            gap: 15px;
            color: black;
            font-size: 16px;
        }

        .browser-toolbar input {
            flex-grow: 1;
            font-family: 'Pixelated MS Sans Serif', Arial;
            font-size: 16px;
            padding: 4px;
        }

        .browser-page {
            background-color: #ffffff;
            height: calc(100% - 80px);
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
        }

        /* LOGO MUUGLE */
        .mugle-logo {
            font-size: 110px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -4px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.15);
        }

        /* Barra di ricerca reale (Gigante) */
        .search-box {
            width: 60%;
            max-width: 800px;
            padding: 12px 15px;
            font-size: 28px;
            border: 3px inset #c0c0c0;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }
        
        .search-box:focus {
            background-color: #f0f8ff;
        }

        .search-buttons {
            display: flex;
            gap: 15px;
        }

        .search-buttons button {
            font-size: 18px;
            padding: 8px 15px;
            cursor: pointer;
        }

        /* BARRA DELLE APPLICAZIONI INGRANDITA (TASKBAR) */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background-color: #c0c0c0;
            border-top: 2px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            box-sizing: border-box;
            z-index: 1000;
            color: black;
        }

        /* BOTTONE START */
        .start-button {
            display: flex;
            align-items: center;
            height: 35px;
            padding: 0 12px;
            margin-left: 2px;
            background-color: #c0c0c0;
            font-weight: bold;
            font-size: 18px;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #000;
            border-right: 2px solid #000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
        }

        /* TUA ICONA CUSTOM START (Ora è quadrata 1:1) */
        .start-button .custom-start-icon {
            width: 28px;  
            height: 28px; 
            margin-right: 8px; 
            image-rendering: auto; 
        }

        /* OROLOGIO E SYSTEM TRAY */
        .system-tray {
            height: 28px;
            margin-right: 8px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-size: 16px;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-bottom: 2px solid #fff;
            border-right: 2px solid #fff;
        }
    </style>
</head>
<body>

    <!-- OVERLAY EFFETTO CRT -->
    <div class="crt-overlay"></div>

    <!-- ICONE SUL DESKTOP -->
    <div class="desktop">
        
        <!-- ICONA INTERNET -->
        <div class="desktop-icon clickable" ondblclick="startDialUp()">
            <img src="https://raw.githubusercontent.com/AlexMeub/win98-icons/master/png/network_internet_pcs-0.png" alt="Internet">
            <span>MurenaNET</span>
        </div>

        <!-- IL TUO CESTINO ANIMATO CUSTOM -->
        <div class="desktop-icon clickable">
            <div class="cestino-animato"></div>
            <span>Cestino</span>
        </div>

        <!-- LE TUE CARTELLE CUSTOM -->
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" alt="Live">
            <span>LIVE</span>
        </div>
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" alt="Video">
            <span>VIDEO</span>
        </div>
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" alt="Ospiti">
            <span>OSPITI</span>
        </div>
    </div>

    <!-- FINESTRA 1: CONNESSIONE MODEM -->
    <div class="window" id="dialup-window">
        <div class="title-bar">
            <div class="title-bar-text">Connessione a MurenaNET</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="closeDialUp()"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="dialup-content">
                <img src="https://raw.githubusercontent.com/AlexMeub/win98-icons/master/png/modem-0.png" width="48" height="48" style="image-rendering: pixelated;">
                <div style="flex-grow: 1;">
                    <p id="dial-status" style="margin-bottom: 10px;">Inizializzazione modem...</p>
                    <div style="width: 100%; background: #fff; border: 2px inset #c0c0c0; height: 20px;">
                        <div id="dial-progress" style="width: 0%; height: 100%; background: #000080;"></div>
                    </div>
                </div>
            </div>
            <div style="text-align: right; margin-top: 10px;">
                <button onclick="closeDialUp()" style="font-size: 16px; padding: 4px 12px;">Annulla</button>
            </div>
        </div>
    </div>

    <!-- FINESTRA 2: BROWSER MUUGLE INGRANDITO -->
    <div class="window" id="browser-window">
        <div class="title-bar">
            <div class="title-bar-text">Murena Navigator - Muugle</div>
            <div class="title-bar-controls">
                <button aria-label="Maximize"></button>
                <button aria-label="Close" onclick="closeBrowser()"></button>
            </div>
        </div>
        
        <div class="browser-toolbar">
            Indirizzo: <input type="text" value="http://www.muugle.net" disabled>
            <button style="font-size: 14px; padding: 2px 10px;">Vai</button>
        </div>

        <div class="browser-page">
            <div class="mugle-logo">
                <span style="color: #0039b6;">M</span><span style="color: #c41200;">u</span><span style="color: #f3c518;">u</span><span style="color: #0039b6;">g</span><span style="color: #30a72f;">l</span><span style="color: #c41200;">e</span>
            </div>

            <input type="text" class="search-box" id="live-search" placeholder="Cerca..." autocomplete="off">
            
            <div class="search-buttons">
                <button>Cerca con Muugle</button>
                <button>Mi sento fortunato</button>
            </div>
            
            <p style="margin-top: 60px; font-size: 16px; color: gray;">
                &copy; 1998 Studio Murena Corporation
            </p>
        </div>
    </div>

    <!-- BARRA DELLE APPLICAZIONI IN BASSO GIGANTE -->
    <div class="taskbar">
        <!-- Bottone con la tua START custom e la scritta -->
        <div class="start-button clickable">
            <img src="assets/start.png" class="custom-start-icon" alt="Icona">
            Start
        </div>
        <div class="system-tray" id="clock">00:00</div>
    </div>

    <!-- SCRIPT (Orologio e Finestre) -->
    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = hours + ':' + minutes;
        }
        updateTime(); setInterval(updateTime, 1000);

        let dialTimeout1, dialTimeout2, dialTimeout3;

        function startDialUp() {
            document.getElementById('dialup-window').style.display = 'block';
            let status = document.getElementById('dial-status');
            let progress = document.getElementById('dial-progress');
            
            status.innerText = "Composizione numero 0800-MURENA...";
            progress.style.width = "20%";

            dialTimeout1 = setTimeout(() => {
                status.innerText = "Verifica nome utente e password...";
                progress.style.width = "60%";
            }, 1500);

            dialTimeout2 = setTimeout(() => {
                status.innerText = "Registrazione del computer sulla rete...";
                progress.style.width = "100%";
            }, 3000);

            dialTimeout3 = setTimeout(() => {
                document.getElementById('dialup-window').style.display = 'none';
                document.getElementById('browser-window').style.display = 'block';
                document.getElementById('live-search').focus();
            }, 4000);
        }

        function closeDialUp() {
            document.getElementById('dialup-window').style.display = 'none';
            clearTimeout(dialTimeout1); clearTimeout(dialTimeout2); clearTimeout(dialTimeout3);
        }

        function closeBrowser() {
            document.getElementById('browser-window').style.display = 'none';
            document.getElementById('live-search').value = "";
        }
    </script>

</body>
</html>
