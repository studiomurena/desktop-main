<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MURENA_OS - Win95 [CUSTOM ASSETS]</title>
    <!-- Libreria base per l'estetica delle finestre Win95/98 -->
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        /* IMPOSTAZIONI GLOBALI E CURSORI RETRO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Sfondo Nero Assoluto */
            color: white;
            font-family: 'Pixelated MS Sans Serif', Arial, sans-serif;
            overflow: hidden;
            /* Cursore base Win95/98 */
            cursor: url('https://raw.githubusercontent.com/AlexMeub/win98-icons/master/cursors/arrow.cur'), default;
        }

        .clickable {
            cursor: url('https://raw.githubusercontent.com/AlexMeub/win98-icons/master/cursors/pointer.cur'), pointer;
        }

        /* EFFETTO TUBO CATODICO (CRT) */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Permette di cliccare e SCRIVERE sotto l'effetto */
            z-index: 9999;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            animation: flicker 0.15s infinite, glitch-jump 7s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 0.95; }
        }

        @keyframes glitch-jump {
            0% { transform: translateY(0); opacity: 1; }
            98% { transform: translateY(0); opacity: 1; }
            99% { transform: translateY(2px); opacity: 0.8; }
            100% { transform: translateY(-1px); opacity: 0.9; }
        }

        /* LAYOUT DEL DESKTOP */
        .desktop {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 60px);
            position: absolute;
            z-index: 10;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
            text-align: center;
        }

        /* TUA ICONA CUSTOM CARTELLA */
        .desktop-icon .custom-folder {
            width: 32px;
            height: 32px;
            /* Se la tua cartella è a bassa risoluzione (pixel art), questo la tiene sgranata */
            image-rendering: pixelated; 
            margin-bottom: 5px;
        }

        .desktop-icon span {
            color: white;
            font-size: 11px;
            padding: 2px;
        }

        .desktop-icon:active span {
            background-color: #000080;
            border: 1px dotted white;
        }

        /* FINESTRE */
        .window {
            position: absolute;
            display: none; /* Nascoste di default */
            z-index: 100;
        }

        /* FINESTRA MODEM DIAL-UP */
        #dialup-window {
            top: 35%;
            left: 40%;
            width: 350px;
        }

        .dialup-content {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
        }

        /* FINESTRA BROWSER STUDIO MUGLE */
        #browser-window {
            top: 10%;
            left: 15%;
            width: 70%;
            height: 70%;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .browser-toolbar {
            background: #c0c0c0;
            padding: 5px;
            border-bottom: 2px solid white;
            display: flex;
            align-items: center;
            gap: 10px;
            color: black;
            font-size: 12px;
        }

        .browser-toolbar input {
            flex-grow: 1;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }

        .browser-page {
            background-color: #ffffff;
            height: calc(100% - 70px);
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Times New Roman', Times, serif;
            position: relative;
        }

        /* LOGO TIPO VECCHIO GOOGLE */
        .mugle-logo {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        /* Barra di ricerca reale */
        .search-box {
            width: 400px;
            padding: 5px;
            font-size: 16px;
            border: 2px inset #c0c0c0;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }
        
        .search-box:focus {
            background-color: #f0f8ff; /* Azzurrino quando ci scrivi */
        }

        .search-buttons {
            display: flex;
            gap: 10px;
        }

        /* BARRA DELLE APPLICAZIONI (TASKBAR) */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 28px;
            background-color: #c0c0c0;
            border-top: 1px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            z-index: 1000;
            color: black;
        }

        .start-button {
            display: flex;
            align-items: center;
            height: 22px;
            padding: 0 5px;
            margin-left: 2px;
            background-color: #c0c0c0;
            font-weight: bold;
            font-size: 12px;
            border-top: 1px solid #fff;
            border-left: 1px solid #fff;
            border-bottom: 1px solid #000;
            border-right: 1px solid #000;
            box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080;
        }

        /* TUA ICONA CUSTOM START */
        .start-button .custom-start-icon {
            width: 16px;
            height: 16px;
            margin-right: 4px;
            image-rendering: pixelated;
        }

        .system-tray {
            height: 20px;
            margin-right: 5px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            font-size: 11px;
            border-top: 1px solid #808080;
            border-left: 1px solid #808080;
            border-bottom: 1px solid #fff;
            border-right: 1px solid #fff;
        }
    </style>
</head>
<body>

    <!-- OVERLAY EFFETTO CRT -->
    <div class="crt-overlay"></div>

    <!-- ICONE SUL DESKTOP -->
    <div class="desktop">
        
        <!-- ICONA INTERNET (Tiene l'icona originale come "connessione") -->
        <div class="desktop-icon clickable" ondblclick="startDialUp()">
            <img src="https://raw.githubusercontent.com/AlexMeub/win98-icons/master/png/network_internet_pcs-0.png" width="32" alt="Internet">
            <span>Connessione a MurenaNET</span>
        </div>

        <!-- CARTELLE CON LA TUA ICONA CUSTOM (pescate dalla cartella assets/) -->
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" class="custom-folder" alt="Live">
            <span>LIVE</span>
        </div>
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" class="custom-folder" alt="Video">
            <span>VIDEO</span>
        </div>
        <div class="desktop-icon clickable">
            <img src="assets/cartella.png" class="custom-folder" alt="Ospiti">
            <span>OSPITI</span>
        </div>
    </div>

    <!-- FINESTRA 1: CONNESSIONE MODEM (DIAL-UP) -->
    <div class="window" id="dialup-window">
        <div class="title-bar">
            <div class="title-bar-text">Connessione a MurenaNET</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="closeDialUp()"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="dialup-content">
                <img src="https://raw.githubusercontent.com/AlexMeub/win98-icons/master/png/modem-0.png" width="32" style="image-rendering: pixelated;">
                <div>
                    <p id="dial-status" style="margin-bottom: 10px;">Inizializzazione modem...</p>
                    <div style="width: 250px; background: #fff; border: 1px solid #808080; height: 15px;">
                        <div id="dial-progress" style="width: 0%; height: 100%; background: #000080;"></div>
                    </div>
                </div>
            </div>
            <div style="text-align: right; margin-top: 10px;">
                <button onclick="closeDialUp()">Annulla</button>
            </div>
        </div>
    </div>

    <!-- FINESTRA 2: BROWSER RETRO CON STUDIO MUGLE -->
    <div class="window" id="browser-window">
        <div class="title-bar">
            <div class="title-bar-text">Murena Navigator - STUDIO MUgle</div>
            <div class="title-bar-controls">
                <button aria-label="Maximize"></button>
                <button aria-label="Close" onclick="closeBrowser()"></button>
            </div>
        </div>
        
        <!-- Finta barra degli indirizzi -->
        <div class="browser-toolbar">
            Indirizzo: <input type="text" value="http://www.studiomugle.net" disabled>
            <button>Vai</button>
        </div>

        <!-- LA VERA PAGINA WEB DOVE PUOI SCRIVERE -->
        <div class="browser-page">
            <div class="mugle-logo">
                <span style="color: #0039b6;">S</span><span style="color: #c41200;">T</span><span style="color: #f3c518;">U</span><span style="color: #0039b6;">D</span><span style="color: #30a72f;">I</span><span style="color: #c41200;">O</span>
                &nbsp;
                <span style="color: #0039b6;">M</span><span style="color: #c41200;">U</span><span style="color: #f3c518;">g</span><span style="color: #0039b6;">l</span><span style="color: #30a72f;">e</span>
            </div>

            <!-- QUESTA È LA BARRA DOVE SCRIVERAI DAL VIVO -->
            <input type="text" class="search-box" id="live-search" placeholder="Cerca nel web..." autocomplete="off">
            
            <div class="search-buttons">
                <button>Cerca con MUgle</button>
                <button>Mi sento fortunato</button>
            </div>
            
            <p style="margin-top: 40px; font-size: 12px; color: gray;">
                &copy; 1998 Studio Murena Corporation
            </p>
        </div>
    </div>

    <!-- BARRA DELLE APPLICAZIONI IN BASSO -->
    <div class="taskbar">
        <!-- Bottone Start con TUA ICONA (pescata dalla cartella assets/) -->
        <div class="start-button clickable">
            <img src="assets/start.png" class="custom-start-icon" alt="Win">
            Start
        </div>
        <div class="system-tray" id="clock">00:00</div>
    </div>

    <!-- SCRIPT (Magia delle animazioni) -->
    <script>
        // Funzione per l'orologio
        function updateTime() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = hours + ':' + minutes;
        }
        updateTime(); setInterval(updateTime, 1000);

        // FUNZIONE ANIMAZIONE DIAL-UP E APERTURA BROWSER
        let dialTimeout1, dialTimeout2, dialTimeout3;

        function startDialUp() {
            document.getElementById('dialup-window').style.display = 'block';
            let status = document.getElementById('dial-status');
            let progress = document.getElementById('dial-progress');
            
            status.innerText = "Composizione numero 0800-MURENA...";
            progress.style.width = "20%";

            dialTimeout1 = setTimeout(() => {
                status.innerText = "Verifica nome utente e password...";
                progress.style.width = "60%";
            }, 1500);

            dialTimeout2 = setTimeout(() => {
                status.innerText = "Registrazione del computer sulla rete...";
                progress.style.width = "100%";
            }, 3000);

            dialTimeout3 = setTimeout(() => {
                document.getElementById('dialup-window').style.display = 'none';
                document.getElementById('browser-window').style.display = 'block';
                document.getElementById('live-search').focus();
            }, 4000);
        }

        function closeDialUp() {
            document.getElementById('dialup-window').style.display = 'none';
            clearTimeout(dialTimeout1); clearTimeout(dialTimeout2); clearTimeout(dialTimeout3);
        }

        function closeBrowser() {
            document.getElementById('browser-window').style.display = 'none';
            document.getElementById('live-search').value = "";
        }
    </script>

</body>
</html>
